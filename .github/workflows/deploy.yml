name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "web/**"
      - "deploy/**"
      - ".github/**"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.EC2_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -o BatchMode=yes \
            -p "${{ secrets.EC2_PORT }}" \
            -i ~/.ssh/deploy_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && make deploy-ci"
