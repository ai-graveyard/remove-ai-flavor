name: ${CONTAINER_PREFIX:-remove-ai-flavor}-${CONTAINER_SUFFIX}

services:
  # API service
  api:
    container_name: ${CONTAINER_PREFIX:-remove-ai-flavor}-api${CONTAINER_SUFFIX}
    image: ${DOCKER_REGISTRY:-v2ai}/${IMAGE_PREFIX:-remove-ai-flavor}-api${IMAGE_SUFFIX}:${VERSION:-latest}
    restart: always
    environment:
      # 环境与服务
      ENV: ${ENV:-prod}
      # 认证配置
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-C1H2A3G4E5N6T7}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      AUTH_ACCESS_TOKEN_EXPIRE_MINUTES: ${AUTH_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      AUTH_REFRESH_TOKEN_EXPIRE_DAYS: ${AUTH_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      AUTH_IS_DEBUG: ${AUTH_IS_DEBUG:-False}
      AUTH_DEBUG_CODE: ${AUTH_DEBUG_CODE:-888888}
      # API 配置
      API_NAME: ${API_NAME:-remove-ai-flavor-api}
      API_VERSION: ${API_VERSION:-0.1}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      API_RELOAD: ${API_RELOAD:-True}
      # PostgreSQL 数据库配置
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-remove-ai-flavor}
      POSTGRES_ECHO: ${POSTGRES_ECHO:-False}
      POSTGRES_POOL_SIZE: ${POSTGRES_POOL_SIZE:-20}
      POSTGRES_MAX_OVERFLOW: ${POSTGRES_MAX_OVERFLOW:-30}
      POSTGRES_POOL_TIMEOUT: ${POSTGRES_POOL_TIMEOUT:-30}
      POSTGRES_POOL_RECYCLE: ${POSTGRES_POOL_RECYCLE:-3600}
      POSTGRES_POOL_PRE_PING: ${POSTGRES_POOL_PRE_PING:-True}
      # 缓存 Redis 配置
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USER: ${REDIS_USER:-default}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      REDIS_DB: ${REDIS_DB:-0}
      # 通知
      MAIL_SEND_METHOD: ${MAIL_SEND_METHOD:-SMTP}
      # SMTP
      MAIL_USERNAME: ${MAIL_USERNAME:-no-reply@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-123456}
      MAIL_FROM: ${MAIL_FROM:-no-reply@example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.example.com}
      # Resend
      RESEND_API_KEY: ${RESEND_API_KEY:-re_1234}
      RESEND_MAIL_FROM: ${RESEND_MAIL_FROM:-onboarding@resend.dev}
      # 大模型与 Agent
      AGENT_API_KEY: ${AGENT_API_KEY:-sk-proj-***}
      AGENT_BASE_URL: ${AGENT_BASE_URL:-https://api.openai.ai/v1/chat/completions}
      AGENT_MODEL_NAME: ${AGENT_MODEL_NAME:-gpt-4.1-mini}
      # 会员与支付
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-pk_test_xxx}
      STRIPE_PRIVATE_KEY: ${STRIPE_PRIVATE_KEY:-sk_test_xxx}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_cexxx}
      # 免费会员计划
      MEMBERSHIP_FREE_NAME: ${MEMBERSHIP_FREE_NAME:-免费会员}
      MEMBERSHIP_FREE_DAILY_MESSAGE_LIMIT: ${MEMBERSHIP_FREE_DAILY_MESSAGE_LIMIT:-100}
      MEMBERSHIP_FREE_DAILY_TOKEN_LIMIT: ${MEMBERSHIP_FREE_DAILY_TOKEN_LIMIT:-1000000}
      MEMBERSHIP_FREE_CONVERSATION_TURN_LIMIT: ${MEMBERSHIP_FREE_CONVERSATION_TURN_LIMIT:-10}
      MEMBERSHIP_FREE_PRICE: ${MEMBERSHIP_FREE_PRICE:-0.0}
      MEMBERSHIP_FREE_CURRENCY: ${MEMBERSHIP_FREE_CURRENCY:-USD}
      MEMBERSHIP_FREE_DURATION_DAYS: ${MEMBERSHIP_FREE_DURATION_DAYS:-36500}
      MEMBERSHIP_FREE_DESCRIPTION: ${MEMBERSHIP_FREE_DESCRIPTION:-免费用户基础计划}
      # 月度会员计划
      MEMBERSHIP_MONTHLY_NAME: ${MEMBERSHIP_MONTHLY_NAME:-月度会员}
      MEMBERSHIP_MONTHLY_DAILY_MESSAGE_LIMIT: ${MEMBERSHIP_MONTHLY_DAILY_MESSAGE_LIMIT:-800}
      MEMBERSHIP_MONTHLY_DAILY_TOKEN_LIMIT: ${MEMBERSHIP_MONTHLY_DAILY_TOKEN_LIMIT:-8000000}
      MEMBERSHIP_MONTHLY_CONVERSATION_TURN_LIMIT: ${MEMBERSHIP_MONTHLY_CONVERSATION_TURN_LIMIT:-30}
      MEMBERSHIP_MONTHLY_PRICE: ${MEMBERSHIP_MONTHLY_PRICE:-9.9}
      MEMBERSHIP_MONTHLY_CURRENCY: ${MEMBERSHIP_MONTHLY_CURRENCY:-USD}
      MEMBERSHIP_MONTHLY_DURATION_DAYS: ${MEMBERSHIP_MONTHLY_DURATION_DAYS:-30}
      MEMBERSHIP_MONTHLY_DESCRIPTION: ${MEMBERSHIP_MONTHLY_DESCRIPTION:-月度付费会员计划}
      # 年度会员计划
      MEMBERSHIP_YEARLY_NAME: ${MEMBERSHIP_YEARLY_NAME:-年度会员}
      MEMBERSHIP_YEARLY_DAILY_MESSAGE_LIMIT: ${MEMBERSHIP_YEARLY_DAILY_MESSAGE_LIMIT:-1000}
      MEMBERSHIP_YEARLY_DAILY_TOKEN_LIMIT: ${MEMBERSHIP_YEARLY_DAILY_TOKEN_LIMIT:-10000000}
      MEMBERSHIP_YEARLY_CONVERSATION_TURN_LIMIT: ${MEMBERSHIP_YEARLY_CONVERSATION_TURN_LIMIT:-50}
      MEMBERSHIP_YEARLY_PRICE: ${MEMBERSHIP_YEARLY_PRICE:-99.9}
      MEMBERSHIP_YEARLY_CURRENCY: ${MEMBERSHIP_YEARLY_CURRENCY:-USD}
      MEMBERSHIP_YEARLY_DURATION_DAYS: ${MEMBERSHIP_YEARLY_DURATION_DAYS:-365}
      MEMBERSHIP_YEARLY_DESCRIPTION: ${MEMBERSHIP_YEARLY_DESCRIPTION:-年度付费会员计划}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:8000/health" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  web:
    container_name: ${CONTAINER_PREFIX:-remove-ai-flavor}-web${CONTAINER_SUFFIX}
    image: ${DOCKER_REGISTRY:-v2ai}/${IMAGE_PREFIX:-remove-ai-flavor}-web${IMAGE_SUFFIX}:${VERSION:-latest}
    restart: always
    environment:
      HOSTNAME: ${HOSTNAME:-0.0.0.0}
      PORT: ${PORT:-3000}
    networks:
      - default

  nginx:
    container_name: ${CONTAINER_PREFIX:-remove-ai-flavor}-nginx${CONTAINER_SUFFIX}
    image: nginx:1.27.5-alpine3.21
    restart: always
    environment:
      NGINX_PORT: ${NGINX_PORT:-8081}
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
    ports:
      - ${NGINX_PORT:-8081}:80
    volumes:
      - $PWD/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      api:
        condition: service_healthy
    networks:
      - default

  postgres:
    container_name: ${CONTAINER_PREFIX:-remove-ai-flavor}-postgres${CONTAINER_SUFFIX}
    image: postgres:17.4-bookworm
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-remove-ai-flavor}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data/pgdata}
    ports:
      - ${POSTGRES_EXPOSE_PORT:-15432}:5432
    volumes:
      - $PWD/volumes/db/data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD', 'pg_isready', '-h', 'postgres', '-U', '${POSTGRES_USER:-postgres}', '-d', '${POSTGRES_DB:-remove-ai-flavor}' ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  # The redis cache.
  redis:
    container_name: ${CONTAINER_PREFIX:-remove-ai-flavor}-redis${CONTAINER_SUFFIX}
    image: redis:7.2.4-alpine
    restart: always
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-123456}
    ports:
      - ${REDIS_EXPOSE_PORT:-16379}:6379
    volumes:
      - $PWD/volumes/redis/data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456} --save 60 1 --loglevel warning
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
    networks:
      - default

  # Stripe CLI for webhook forwarding in test environment
  stripe-cli:
    container_name: ${CONTAINER_PREFIX:-remove-ai-flavor}-stripe-cli${CONTAINER_SUFFIX}
    image: stripe/stripe-cli:v1.30.0
    restart: always
    environment:
      STRIPE_API_KEY: ${STRIPE_PRIVATE_KEY:-sk_test_xxx}
    command: >
      listen
      --forward-to http://nginx:80/api/v1/orders/stripe/webhook 
      --skip-verify
    depends_on:
      api:
        condition: service_healthy
    networks:
      - default

networks:
  default:
    name: ${NETWORK_NAME:-remove-ai-flavor-network}
    driver: bridge
