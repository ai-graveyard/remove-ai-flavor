server {
    listen 80;
    server_name localhost; 

    # SSE API 路由
    location /api/v1/ {
        proxy_pass http://api:8000/api/v1/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # 🔑 SSE 关键配置
        proxy_buffering off;              # 禁止代理缓冲
        proxy_cache off;                  # 禁止缓存
        proxy_set_header Connection '';   # 避免错误的 upgrade 头
        proxy_set_header X-Accel-Buffering no;  # 告诉下游不要缓冲
        chunked_transfer_encoding on;     # 确保分块传输

        add_header Cache-Control no-cache;

        # 设置超时时间 300s
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    # 前端应用
    location / {
        proxy_pass http://web:3000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
